name: {{app_name.snakeCase()}}
description: A production-ready Flutter application generated by flutter-factory.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  {{#is_rest_backend}}
  dio: ^5.9.0
  hive: ^2.2.3
  path_provider: ^2.1.5
  {{/is_rest_backend}}{{#is_firebase_backend}}
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.3.0
  {{/is_firebase_backend}}
  {{#is_bloc}}bloc: ^9.1.0
  flutter_bloc: ^9.1.1
  {{/is_bloc}}{{#is_riverpod}}
  flutter_riverpod: ^2.6.1
  {{/is_riverpod}}
  freezed_annotation: ^3.1.0
  go_router: ^16.3.0
  json_annotation: ^4.9.0
  logger: ^2.6.2

dev_dependencies:
  build_runner: ^2.10.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
