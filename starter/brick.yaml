name: starter
description: Generates the base flutter-factory starter application.
version: 0.1.0

vars:
  app_name:
    type: string
    description: Flutter application package name.
    prompt: What is the app name?
  org_name:
    type: string
    description: Reverse-domain organization identifier.
    default: com.example
    prompt: What is the organization id?
  state_management:
    type: enum
    description: State management solution.
    default: riverpod
    values:
      - riverpod
      - bloc
    prompt: Which state management solution should be used?
  backend:
    type: enum
    description: Backend preset.
    default: rest_firebase_hybrid
    values:
      - rest_firebase_hybrid
    prompt: Which backend preset should be used?
  auth:
    type: boolean
    description: Whether auth scaffolding should be generated.
    default: false
    prompt: Should auth be included?
  offline_support:
    type: boolean
    description: Whether offline support scaffolding should be generated.
    default: false
    prompt: Should offline support be included?
